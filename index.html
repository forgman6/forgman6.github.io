<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Time</title>
</head>
<body>
    <noscript>You need javascript buddy</noscript>
    <h1 id="time">Loading...</h1>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let isoString = urlParams.get('isoString');
        isoString = isoString.trim();
        isodate = new Date(isoString);
        const time = document.getElementById("time");
        time.innerText = isodate.toLocaleString();
    </script>
</body>

</html>
